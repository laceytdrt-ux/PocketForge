<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title></title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Segoe UI',sans-serif;background:#0f0f0f;color:#f5f5f5;min-height:100vh}
  .hero{padding:80px 24px 60px;text-align:center;background:linear-gradient(135deg,#f9731622,#0f0f0f)}
  .badge{display:inline-block;background:#f9731622;color:#f97316;border:1px solid #f9731644;border-radius:20px;padding:6px 16px;font-size:12px;font-weight:600;letter-spacing:1px;text-transform:uppercase;margin-bottom:20px}
  h1{font-size:clamp(32px,8vw,56px);font-weight:800;line-height:1.1;margin-bottom:20px}
  .sub{font-size:18px;opacity:0.7;max-width:480px;margin:0 auto 36px;line-height:1.6}
  .btn{display:inline-block;background:#f97316;color:#fff;padding:16px 36px;border-radius:12px;font-weight:700;font-size:16px;text-decoration:none;transition:transform 0.2s,opacity 0.2s}
  .btn:hover{transform:translateY(-2px);opacity:0.9}
  .features{padding:60px 24px;max-width:600px;margin:0 auto}
  .feat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:16px;margin-top:32px}
  .feat{background:#f9731611;border:1px solid #f9731622;border-radius:16px;padding:24px 16px;text-align:center}
  .feat-icon{font-size:32px;margin-bottom:12px}
  .feat-title{font-weight:700;margin-bottom:6px}
  .feat-desc{font-size:13px;opacity:0.6}
  .cta-section{background:#f97316;color:#fff;padding:60px 24px;text-align:center}
  .cta-section h2{font-size:28px;font-weight:800;margin-bottom:16px}
  .cta-section p{opacity:0.85;margin-bottom:28px}
  .btn-white{background:#fff;color:#f97316;padding:14px 32px;border-radius:12px;font-weight:700;font-size:15px;text-decoration:none;display:inline-block}
  footer{padding:24px;text-align:center;opacity:0.4;font-size:13px}
</style>
</head>
<body>
<section class="hero">
  <div class="badge">Now Available</div>
  <h1></h1>
  <p class="sub"></p>
  <a href="#" class="btn">Get Started</a>
</section>
<section class="features">
  <div class="feat-grid">
    <div class="feat"><div class="feat-icon">⚡</div><div class="feat-title">Fast</div><div class="feat-desc">Lightning quick</div></div>
    <div class="feat"><div class="feat-icon">🎯</div><div class="feat-title">Focused</div><div class="feat-desc">Purpose built</div></div>
    <div class="feat"><div class="feat-icon">💎</div><div class="feat-title">Quality</div><div class="feat-desc">Premium grade</div></div>
  </div>
</section>
<section class="cta-section">
  <h2>Ready to start?</h2>
  <p>Join thousands of satisfied customers today.</p>
  <a href="#" class="btn-white">Get Started</a>
</section>
<footer>© 2026 . All rights reserved.</footer>
</body></html>
